<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Почивка | IM Reformer Pilates Academy</title>
    <link rel="stylesheet" href="./styles/main.css" type=text/css>
    <link rel="stylesheet" href="./styles/modal.css" type=text/css>
    <link rel="stylesheet" href="./styles/carousel.css">
    <link href="./public/blue-favicon.ico" rel="shortcut icon" type="image/x-icon">
</head>

<body>
    <div class="site-wrapper">
        <header>
            <div class="header-logo">
                <img src="./public/logo.svg" alt="logo" />
            </div>
        </header>

        <div class="main-wrapper">
            <div class="time-container">
                <div class="time">
                    <p class="m">00</p>
                    <p>:</p>
                    <p class="s">00</p>
                </div>
                <div class="info">
                    <p>Минути</p>
                    <button class="timer-toggle timer-off" id="timer-toggle" type="button"
                            role="switch" aria-checked="false" aria-label="Старт / Пауза на таймера">
                        <span class="toggle-text on">ВКЛ</span>
                        <span class="toggle-text off">ИЗКЛ</span>
                        <span class="toggle-knob"></span>
                    </button>
                    <p>Секунди</p>
                </div>
            </div>
            <div class="slider">
                <div id="partners"></div>
            </div>
        </div>

        <div class="modal-overlay" id="modal-overlay"></div>

        <div class="modal" id="modal">
            <button class="close-button" id="close-button" title="Затвори">x</button>
            <section class="modal-content">
                <form class="time-form">
                    <div>
                        <input min="0" max="59" placeholder="Минути" tabindex="1" type="number" name="minutes">
                        <input min="0" max="59" placeholder="Секунди" tabindex="2" type="number" name="seconds">
                    </div>
                    <button tabindex="3" type="submit">Старт</button>
                </form>
                <div class="suggestions">
                    <div>05</div>
                    <div>10</div>
                    <div>15</div>
                    <div>20</div>
                    <div>25</div>
                    <div>30</div>
                </div>
            </section>
        </div>
    </div>
    <!-- Музика: пробва YouTube; ако не успее (напр. локално), пуска тази mp3. -->
    <audio loop>
        <source src="./public/melody.mp3" type="audio/mp3">
    </audio>
    <div id="yt-player-wrap" aria-hidden="true">
        <div id="yt-player"></div>
    </div>
    <script src="./scripts/app.js"></script>
</body>

</html>
